<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibecraft</title>
    <style>
        /* === UI & HUD SYSTEM === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #87CEEB; font-family: 'Courier New', monospace; user-select: none; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 22px; height: 22px;
            transform: translate(-50%, -50%);
            pointer-events: none; z-index: 5;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute;
            background: rgba(255,255,255,0.85);
            mix-blend-mode: difference;
        }
        #crosshair::before { top: 10px; left: 0; width: 22px; height: 2px; }
        #crosshair::after { top: 0; left: 10px; width: 2px; height: 22px; }

        #hud-bars {
            position: absolute; bottom: 82px; left: 50%; transform: translateX(-50%);
            display: flex; justify-content: space-between; width: 484px;
            pointer-events: none; z-index: 6;
        }
        .bar-icons { display: flex; gap: 1px; }
        .heart, .food { width: 18px; height: 18px; position: relative; }
        .heart svg, .food svg { width: 18px; height: 18px; }

        #hotbar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 2px;
            background: #c6c6c6; padding: 4px;
            border: 3px solid #555; border-top-color: #fff; border-left-color: #fff;
            border-bottom-color: #000; border-right-color: #000;
            z-index: 5; image-rendering: pixelated;
        }
        .hslot {
            width: 48px; height: 48px;
            border: 2px solid #8b8b8b; border-top-color: #373737; border-left-color: #373737;
            border-bottom-color: #fff; border-right-color: #fff;
            background: #8b8b8b; position: relative;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .hslot.active {
            border: 3px solid #fff; border-bottom-color: #373737; border-right-color: #373737;
            border-top-color: #fff; border-left-color: #fff;
        }
        .hslot img { width: 32px; height: 32px; image-rendering: pixelated; pointer-events: none; }
        .hslot .count {
            position: absolute; bottom: 1px; right: 3px;
            color: #fff; font-size: 12px; font-weight: bold;
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            pointer-events: none;
        }

        #inventory-screen {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.75);
            display: none; align-items: center; justify-content: center;
            z-index: 20;
        }
        #inventory-screen.open { display: flex; }
        #inventory-panel {
            background: #c6c6c6;
            border: 4px solid #555;
            border-top-color: #fff; border-left-color: #fff;
            border-bottom-color: #000; border-right-color: #000;
            padding: 12px;
        }
        #inventory-panel h3 {
            text-align: center; margin-bottom: 8px;
            font-size: 14px; color: #404040;
        }
        .inv-grid {
            display: grid; grid-template-columns: repeat(9, 48px); gap: 2px;
            margin-bottom: 10px;
        }
        .inv-slot {
            width: 48px; height: 48px;
            border: 2px solid #8b8b8b; border-top-color: #373737; border-left-color: #373737;
            border-bottom-color: #fff; border-right-color: #fff;
            background: #8b8b8b; position: relative;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .inv-slot:hover { background: #aaa; }
        .inv-slot img { width: 32px; height: 32px; image-rendering: pixelated; pointer-events: none; }
        .inv-slot .count {
            position: absolute; bottom: 1px; right: 3px;
            color: #fff; font-size: 12px; font-weight: bold;
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            pointer-events: none;
        }
        #held-item {
            position: fixed; pointer-events: none; z-index: 30;
            width: 32px; height: 32px; image-rendering: pixelated;
            display: none;
        }

        #menu {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: white; z-index: 10;
            background-color: #5a5a5a;
            background-image:
                linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
                url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32'><rect width='32' height='32' fill='%23685038'/><rect x='0' y='0' width='4' height='4' fill='%237a5d40'/><rect x='8' y='2' width='4' height='4' fill='%2358432e'/><rect x='16' y='6' width='4' height='4' fill='%237a5d40'/><rect x='24' y='4' width='4' height='4' fill='%2358432e'/><rect x='4' y='12' width='4' height='4' fill='%2358432e'/><rect x='12' y='14' width='4' height='4' fill='%237a5d40'/><rect x='20' y='10' width='4' height='4' fill='%2358432e'/><rect x='28' y='14' width='4' height='4' fill='%237a5d40'/><rect x='2' y='22' width='4' height='4' fill='%237a5d40'/><rect x='10' y='24' width='4' height='4' fill='%2358432e'/><rect x='18' y='20' width='4' height='4' fill='%237a5d40'/><rect x='26' y='26' width='4' height='4' fill='%2358432e'/></svg>");
            background-size: 64px 64px;
            image-rendering: pixelated;
            font-family: 'Courier New', monospace;
        }
        #mc-logo {
            position: relative;
            margin-top: 8vh; margin-bottom: 28px;
            text-align: center;
        }
        #mc-logo .title-text {
            font-size: 5.5rem; font-weight: 900;
            color: #d6d6d6; letter-spacing: 6px;
            text-shadow:
                6px 6px 0 #1f1f1f,
                -1px -1px 0 #2c2c2c,
                1px -1px 0 #2c2c2c,
                -1px 1px 0 #2c2c2c,
                1px 1px 0 #2c2c2c,
                0 0 30px rgba(0,0,0,0.5);
        }
        #mc-logo .subtitle {
            color: #ddd; font-size: 0.95rem; margin-top: 6px;
            text-shadow: 2px 2px 0 #222;
        }
        #splash {
            position: absolute;
            top: 30px; right: -80px;
            color: #ffff00;
            font-size: 1.4rem; font-weight: bold;
            text-shadow: 2px 2px 0 #3f3f00;
            transform: rotate(-18deg);
            transform-origin: center;
            animation: splash-pulse 0.8s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes splash-pulse {
            0%,100% { transform: rotate(-18deg) scale(1); }
            50%     { transform: rotate(-18deg) scale(1.12); }
        }
        .menu-buttons {
            display: flex; flex-direction: column; gap: 8px;
            width: 400px; align-items: center;
        }
        .mc-btn {
            width: 100%; padding: 10px;
            background: #6e6e6e;
            color: #fff; font-size: 1.15rem;
            font-family: 'Courier New', monospace; font-weight: bold;
            border: 2px solid #000;
            box-shadow: inset 2px 2px 0 #a0a0a0, inset -2px -2px 0 #3a3a3a;
            cursor: pointer; text-shadow: 2px 2px 0 #1c1c1c;
            letter-spacing: 1px;
            transition: background 0.05s;
        }
        .mc-btn:hover {
            background: #8a8acc;
            box-shadow: inset 2px 2px 0 #b0b0ee, inset -2px -2px 0 #4040aa;
        }
        .mc-btn:active {
            box-shadow: inset -2px -2px 0 #a0a0a0, inset 2px 2px 0 #3a3a3a;
        }
        .mc-btn.half { width: 196px; }
        .btn-row { display: flex; gap: 8px; width: 400px; }
        .menu-footer {
            position: absolute; bottom: 8px; left: 0; right: 0;
            display: flex; justify-content: space-between;
            padding: 0 12px; font-size: 0.85rem; color: #fff;
            text-shadow: 1px 1px 0 #222;
        }

        #pause-screen, #death-screen, #settings-screen {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.6);
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 15; gap: 12px;
            font-family: 'Courier New', monospace;
        }
        #pause-screen.open, #death-screen.open, #settings-screen.open { display: flex; }
        #pause-screen h2, #settings-screen h2 {
            font-size: 2.5rem; color: #fff; margin-bottom: 16px;
            text-shadow: 3px 3px 0 #222;
        }
        #death-screen h2 {
            font-size: 3rem; color: #ff5555; margin-bottom: 16px;
            text-shadow: 3px 3px 0 #220000;
        }

        #hand {
            position: absolute; bottom: -10px; right: 8%;
            width: 180px; height: 200px;
            pointer-events: none; z-index: 4;
            transform-origin: 80% 100%;
            transition: transform 0.05s;
        }
        #hand.swing { animation: swing 0.25s ease-out; }
        @keyframes swing {
            0%   { transform: translate(0,0) rotate(0deg); }
            40%  { transform: translate(-30px,30px) rotate(-25deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }
        #hand svg { width: 100%; height: 100%; image-rendering: pixelated; }

        /* Settings Panel Styles */
        .settings-panel {
            background: #c6c6c6;
            border: 4px solid #555;
            border-top-color: #fff; border-left-color: #fff;
            border-bottom-color: #000; border-right-color: #000;
            padding: 20px 30px;
            width: 450px;
        }
        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: #404040;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .settings-row input[type="range"] {
            width: 250px;
            background: #8b8b8b;
            border: 2px solid #373737;
            border-top-color: #fff; border-left-color: #fff;
            height: 20px;
            -webkit-appearance: none;
            appearance: none;
        }
        .settings-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #6e6e6e;
            border: 2px solid #000;
            box-shadow: inset 1px 1px 0 #a0a0a0, inset -1px -1px 0 #3a3a3a;
            cursor: pointer;
        }
        .settings-row span {
            min-width: 60px;
            text-align: right;
        }
        .settings-buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="crosshair"></div>
    <div id="hud-bars">
        <div class="bar-icons" id="hearts-row"></div>
        <div class="bar-icons" id="food-row"></div>
    </div>
    <div id="hotbar"></div>
    <img id="held-item" src="">
    <div id="inventory-screen">
        <div id="inventory-panel">
            <h3>Инвентарь</h3>
            <div class="inv-grid" id="inv-main"></div>
            <h3>Хотбар</h3>
            <div class="inv-grid" id="inv-hotbar"></div>
        </div>
    </div>
    <div id="hand">
        <svg viewBox="0 0 64 80" xmlns="http://www.w3.org/2000/svg">
            <rect x="14" y="10" width="36" height="68" fill="#f0c8a0" stroke="#000" stroke-width="2"/>
            <rect x="14" y="10" width="36" height="14" fill="#5a9bd4" stroke="#000" stroke-width="2"/>
            <rect x="14" y="24" width="6"  height="54" fill="#d6a886"/>
            <rect x="44" y="24" width="6"  height="54" fill="#c9956d"/>
            <rect x="20" y="40" width="4" height="4" fill="#d6a886"/>
            <rect x="38" y="56" width="4" height="4" fill="#d6a886"/>
        </svg>
    </div>
    <div id="menu">
        <div id="mc-logo">
            <div class="title-text">VIBECRAFT</div>
            <div class="subtitle">ВсОШ по Вайбкодингу в сердце!</div>
            <div id="splash">Т-34</div>
        </div>
        <div class="menu-buttons">
            <button id="start-btn" class="mc-btn">Одиночная игра</button>
            <button class="mc-btn" disabled style="opacity:0.6;cursor:not-allowed">Сетевая игра</button>
            <div class="btn-row">
                <button class="mc-btn half" id="opt-btn">Настройки...</button>
                <button class="mc-btn half" id="quit-btn">Выйти</button>
            </div>
        </div>
        <div class="menu-footer">
            <span>Vibecraft (создано под спайсом)</span>
            <span>Узбеки.</span>
        </div>
    </div>
    <div id="pause-screen">
        <h2>Игра приостановлена</h2>
        <div class="menu-buttons">
            <button id="resume-btn" class="mc-btn">Вернуться в игру</button>
            <button id="inv-btn"    class="mc-btn">Открыть инвентарь</button>
            <button id="exit-btn"   class="mc-btn">Сохранить и выйти</button>
        </div>
    </div>
    <div id="death-screen">
        <h2>Проебал, ахахахах</h2>
        <button id="respawn-btn" class="mc-btn" style="width:300px">Возродиться</button>
        <button id="death-menu-btn" class="mc-btn" style="width:300px">Главное меню</button>
    </div>
    <div id="settings-screen">
        <div class="settings-panel">
            <h2>Настройки</h2>
            <div class="settings-row">
                <label>Чувствительность мыши</label>
                <input type="range" id="sensitivity-slider" min="0.1" max="2.0" step="0.05" value="0.5">
                <span id="sensitivity-value">0.50</span>
            </div>
            <div class="settings-row">
                <label>Громкость</label>
                <input type="range" id="volume-slider" min="0" max="100" step="1" value="100">
                <span id="volume-value">100%</span>
            </div>
            <div class="settings-buttons">
                <button id="settings-back-btn" class="mc-btn" style="flex:1">Назад</button>
                <button id="settings-save-btn" class="mc-btn" style="flex:1">Сохранить</button>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // ============ SETTINGS ============
        let mouseSensitivity = 0.5;
        let volume = 100;
        
        // Load settings from localStorage
        try {
            const saved = localStorage.getItem('vibecraft_settings');
            if (saved) {
                const parsed = JSON.parse(saved);
                mouseSensitivity = parsed.sensitivity ?? 0.5;
                volume = parsed.volume ?? 100;
            }
        } catch(e) { /* ignore */ }
        
        // Update UI sliders
        const sensSlider = document.getElementById('sensitivity-slider');
        const sensVal = document.getElementById('sensitivity-value');
        const volSlider = document.getElementById('volume-slider');
        const volVal = document.getElementById('volume-value');
        
        sensSlider.value = mouseSensitivity;
        sensVal.textContent = mouseSensitivity.toFixed(2);
        volSlider.value = volume;
        volVal.textContent = volume + '%';
        
        sensSlider.addEventListener('input', () => {
            mouseSensitivity = parseFloat(sensSlider.value);
            sensVal.textContent = mouseSensitivity.toFixed(2);
        });
        volSlider.addEventListener('input', () => {
            volume = parseInt(volSlider.value);
            volVal.textContent = volume + '%';
        });
        
        function saveSettings() {
            try {
                localStorage.setItem('vibecraft_settings', JSON.stringify({
                    sensitivity: mouseSensitivity,
                    volume: volume
                }));
            } catch(e) {}
        }

        // ============ CORE CONFIGURATION ============
        const CHUNK_SIZE = 140;
        const MAX_INSTANCES = 120000;
        
        const BLOCK_TYPES = {
            GRASS: 0, DIRT: 1, STONE: 2, WOOD: 3, LEAVES: 4,
            GLASS: 5, WATER: 6, SAND: 7, PLANKS: 8, COBBLESTONE: 9, APPLE: 10
        };
        
        const BLOCK_NAMES = ['Трава','Земля','Камень','Дерево','Листва','Стекло','Вода','Песок','Доски','Булыжник','Яблоко'];
        
        const FOOD_ITEMS = {
            10: { hungerRestore: 4, healthRestore: 0, eatTime: 1.6 }
        };
        
        const SEA_LEVEL = -1;

        const BREAK_TIME = {
            0: 0.75, 1: 0.75, 2: 3.75, 3: 3.0, 4: 0.30, 5: 0.45, 7: 0.75, 8: 3.0, 9: 3.75, 10: 0.30
        };

        const SPLASHES = [
            'Дурка!','Удали себе мозг!','Ещё чуть-чуть и программистов не станет!','Изпользуй 0,1% мозга!',
            'Vibeeee!','Даже твоя бабка ахуела с говнокода!','Слили НТО!','Не открывай исходник!',
            'Симпл димпл лучше попыта','Меню сделано без багов!','Навайбодил за 1.5 часа','Привет, это Навальный'
        ];

        let selectedSlot = 0;

        // ============ SCENE SETUP ============
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 30, 120);

        const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.55);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.85);
        dirLight.position.set(100, 200, 50);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.set(2048, 2048);
        dirLight.shadow.camera.left = -80;
        dirLight.shadow.camera.right = 80;
        dirLight.shadow.camera.top = 80;
        dirLight.shadow.camera.bottom = -80;
        dirLight.shadow.camera.near = 0.1;
        dirLight.shadow.camera.far = 400;
        scene.add(dirLight);

        // ============ TEXTURE GENERATION ============
        function makeTex(colorStr, noiseAmt, isGlass) {
            const c = document.createElement('canvas');
            c.width = 16; c.height = 16;
            const ctx = c.getContext('2d');
            ctx.fillStyle = colorStr;
            ctx.fillRect(0, 0, 16, 16);
            if (!isGlass) {
                for (let i = 0; i < 80; i++) {
                    ctx.fillStyle = Math.random() > 0.5
                        ? `rgba(255,255,255,${0.03 + Math.random()*0.07})`
                        : `rgba(0,0,0,${0.03 + Math.random()*0.07})`;
                    ctx.fillRect(Math.floor(Math.random()*16), Math.floor(Math.random()*16), 1, 1);
                }
            } else {
                ctx.fillStyle = 'rgba(255,255,255,0.35)';
                ctx.fillRect(2, 2, 4, 12);
                ctx.fillRect(2, 2, 12, 4);
            }
            ctx.strokeStyle = 'rgba(0,0,0,0.25)';
            ctx.lineWidth = 1;
            ctx.strokeRect(0.5, 0.5, 15, 15);
            const t = new THREE.CanvasTexture(c);
            t.magFilter = THREE.NearestFilter;
            t.minFilter = THREE.NearestFilter;
            t.colorSpace = THREE.SRGBColorSpace;
            return t;
        }

        const texGrassTop = makeTex('#65b552', 0.08, false);
        const texDirt = makeTex('#805e3f', 0.08, false);

        const cSide = document.createElement('canvas');
        cSide.width = 16; cSide.height = 16;
        const ctxS = cSide.getContext('2d');
        ctxS.drawImage(texDirt.image, 0, 0);
        ctxS.fillStyle = '#65b552';
        ctxS.fillRect(0, 0, 16, 4);
        for (let x = 0; x < 16; x++) {
            if (Math.random()>0.3) ctxS.fillRect(x, 4, 1, 1);
            if (Math.random()>0.7) ctxS.fillRect(x, 5, 1, 1);
        }
        ctxS.strokeStyle = 'rgba(0,0,0,0.25)';
        ctxS.strokeRect(0.5, 0.5, 15, 15);
        const texGrassSide = new THREE.CanvasTexture(cSide);
        texGrassSide.magFilter = THREE.NearestFilter;
        texGrassSide.minFilter = THREE.NearestFilter;
        texGrassSide.colorSpace = THREE.SRGBColorSpace;

        const matGrassTop = new THREE.MeshLambertMaterial({ map: texGrassTop });
        const matDirt = new THREE.MeshLambertMaterial({ map: texDirt });
        const matGrassSide = new THREE.MeshLambertMaterial({ map: texGrassSide });

        const texWater = makeTex('#3355cc', 0.05, true);

        const blockMaterials = [
            [matGrassSide, matGrassSide, matGrassTop, matDirt, matGrassSide, matGrassSide],
            matDirt,
            new THREE.MeshLambertMaterial({ map: makeTex('#7a7a7a', 0.08, false) }),
            new THREE.MeshLambertMaterial({ map: makeTex('#634931', 0.06, false) }),
            new THREE.MeshLambertMaterial({ map: makeTex('#327525', 0.06, false), transparent: true, opacity: 0.9, alphaTest: 0.1 }),
            new THREE.MeshLambertMaterial({ map: makeTex('#cce6ff', 0, true), transparent: true, opacity: 0.5 }),
            new THREE.MeshLambertMaterial({ map: texWater, transparent: true, opacity: 0.65 }),
            new THREE.MeshLambertMaterial({ map: makeTex('#d4c483', 0.07, false) }),
            new THREE.MeshLambertMaterial({ map: makeTex('#b8944e', 0.06, false) }),
            new THREE.MeshLambertMaterial({ map: makeTex('#6b6b6b', 0.1, false) }),
        ];

        // ============ CRACK TEXTURES ============
        const crackTextures = [];
        function makeCrackTex(stage) {
            const c = document.createElement('canvas');
            c.width = 16; c.height = 16;
            const ctx = c.getContext('2d');
            ctx.clearRect(0, 0, 16, 16);
            const lines = stage + 1;
            ctx.strokeStyle = 'rgba(0,0,0,0.85)';
            ctx.lineWidth = 1;
            let seed = 12345 + stage * 7919;
            const rnd = () => { seed = (seed * 1664525 + 1013904223) >>> 0; return (seed & 0xffff) / 0xffff; };
            for (let i = 0; i < lines * 2; i++) {
                const x1 = Math.floor(rnd() * 16), y1 = Math.floor(rnd() * 16);
                const x2 = x1 + Math.floor((rnd() - 0.5) * 8);
                const y2 = y1 + Math.floor((rnd() - 0.5) * 8);
                ctx.beginPath();
                ctx.moveTo(x1 + 0.5, y1 + 0.5);
                ctx.lineTo(x2 + 0.5, y2 + 0.5);
                ctx.stroke();
            }

        function getBlockKey(x, y, z) { return `${Math.round(x)},${Math.round(y)},${Math.round(z)}`; }

        function addBlock(x, y, z, type, update = true) {
            x = Math.round(x); y = Math.round(y); z = Math.round(z);
            const key = getBlockKey(x, y, z);
            if (blocksData.has(key)) return;
            blocksData.set(key, { x, y, z, type });
            if (update) updateMeshes();
        }

        function removeBlock(x, y, z) {
            const key = getBlockKey(x, y, z);
            if (blocksData.has(key)) {
                const block = blocksData.get(key);

        }

        function addItem(type, count) {
            for (let i = 0; i < 36; i++) {
                if (inventory[i] && inventory[i].type === type && inventory[i].count < 64) {
                    const space = 64 - inventory[i].count;
                    const transfer = Math.min(space, count);
                    inventory[i].count += transfer;
                    count -= transfer;
                    if (count <= 0) break;
                }
            }
            for (let i = 0; i < 36; i++) {
                if (count <= 0) break;
                if (!inventory[i]) {
                    const transfer = Math.min(64, count);
                    inventory[i] = { type, count: transfer };
                    count -= transfer;
                }
            }
            buildHotbar();
            if (inventoryOpen) buildInventoryUI();

            const slotIdx = 27 + selectedSlot;

            hunger = Math.min(maxHunger, hunger + food.hungerRestore);

        function updateMeshes() {
            const counts = new Array(10).fill(0);
            for (const data of blocksData.values()) {
                const type = data.type;
                if (type < 0 || type >= 10) continue;
                dummy.position.set(data.x, data.y, data.z);
                dummy.updateMatrix();
                instancedMeshes[type].setMatrixAt(counts[type], dummy.matrix);
                counts[type]++;
            }
            for (let i = 0; i < 10; i++) {
                instancedMeshes[i].count = counts[i];
                instancedMeshes[i].instanceMatrix.needsUpdate = true;
            }
        }

        // ============ TERRAIN GENERATION ============
        function hash(x, z) {
            let n = x * 73856093 ^ z * 19349663;
            n = (n ^ (n >> 13)) * 1274126177;
            return (n & 0x7fffffff) / 0x7fffffff;
        }

        function smoothNoise(x, z) {
            const ix = Math.floor(x), iz = Math.floor(z);
            const fx = x - ix, fz = z - iz;
            const sx = fx * fx * (3 - 2 * fx), sz = fz * fz * (3 - 2 * fz);
            const a = hash(ix, iz), b = hash(ix+1, iz);
            const c = hash(ix, iz+1), d = hash(ix+1, iz+1);
            return a + (b-a)*sx + (c-a)*sz + (a-b-c+d)*sx*sz;
        }

        function fbmNoise(x, z) {
            let val = 0, amp = 1, freq = 1, max = 0;
            for (let i = 0; i < 4; i++) {
                val += smoothNoise(x * freq * 0.05, z * freq * 0.05) * amp;
                max += amp;
                amp *= 0.5;
                freq *= 2;
            }
            return (val / max) * 14 - 5;
        }

        const HS = CHUNK_SIZE / 2;
        const heightMap = new Map();

        function getHeight(x, z) {
            return Math.floor(fbmNoise(x, z));
        }

        for (let x = -HS; x < HS; x++) {
            for (let z = -HS; z < HS; z++) {
                const h = getHeight(x, z);
                heightMap.set(`${x},${z}`, h);
                const isSand = h <= SEA_LEVEL + 1 && h >= SEA_LEVEL - 2;
                for (let y = h - 4; y < h - 1; y++) addBlock(x, y, z, 2, false);
                addBlock(x, h - 1, z, 1, false);
                if (isSand) {
                    addBlock(x, h, z, 7, false);
                    if (h - 1 >= h - 4) {
                        blocksData.delete(getBlockKey(x, h-1, z));
                        addBlock(x, h-1, z, 7, false);
                    }
                } else {
                    addBlock(x, h, z, 0, false);

                if (h < SEA_LEVEL) {

                    addBlock(x, th+6, z, 4, false);
                    addBlock(x+1, th+6, z, 4, false);
                    addBlock(x-1, th+6, z, 4, false);
                    addBlock(x, th+6, z+1, 4, false);
                    addBlock(x, th+6, z-1, 4, false);

        const outlineMesh = new THREE.LineSegments(new THREE.EdgesGeometry(outlineGeo), outlineMat);

        let currentIntersect = null;
        let isMining = false, miningProgress = 0, miningTarget = null;
        const handEl = document.getElementById('hand');

        function swingHand() {
            const now = performance.now();

            handEl.classList.remove('swing');
            void handEl.offsetWidth;

        document.addEventListener('mousedown', (e) => {
            if (inventoryOpen || !controls.isLocked) return;
            if (e.button === 0) {
                isMining = true; miningProgress = 0; miningTarget = null; swingHand();

                if (selType < 0 || selType === BLOCK_TYPES.WATER || selType === BLOCK_TYPES.APPLE) return;
                const pos = currentIntersect.position.clone().add(currentIntersect.normal);
                const px = camera.position.x, py = camera.position.y, pz = camera.position.z;
                const inX = Math.abs(pos.x - px) < 0.8, inZ = Math.abs(pos.z - pz) < 0.8, inY = pos.y > py - 2.0 && pos.y < py + 0.5;
                if (!(inX && inZ && inY) && consumeSelectedBlock()) {
                    addBlock(pos.x, pos.y, pos.z, selType);
                }
            }
        });

        document.addEventListener('mouseup', (e) => { if (e.button === 0) resetMining(); });
        document.addEventListener('contextmenu', e => e.preventDefault());

        const P_W = 0.3, P_FEET = -1.6, P_HEAD = 0.2, GROUND_EPS = 0.001;

        function getPlayerAABB(pos) {
            return {
                minX: pos.x - P_W, maxX: pos.x + P_W,
                minY: pos.y + P_FEET + GROUND_EPS, maxY: pos.y + P_HEAD,
                minZ: pos.z - P_W, maxZ: pos.z + P_W
            };
        }

        function blockOverlapsAABB(aabb, bx, by, bz) {
            return aabb.maxX > bx - 0.5 && aabb.minX < bx + 0.5 &&
                   aabb.maxY > by - 0.5 && aabb.minY < by + 0.5 &&
                   aabb.maxZ > bz - 0.5 && aabb.minZ < bz + 0.5;
        }

        function isSolid(x, y, z) {
            const b = blocksData.get(getBlockKey(x, y, z));
            return b && b.type !== BLOCK_TYPES.WATER;
        }

        function getCollisions(pos) {
            const aabb = getPlayerAABB(pos);
            const bxMin = Math.floor(aabb.minX + 0.5), bxMax = Math.floor(aabb.maxX + 0.5);
            const byMin = Math.floor(aabb.minY + 0.5), byMax = Math.floor(aabb.maxY + 0.5);
            const bzMin = Math.floor(aabb.minZ + 0.5), bzMax = Math.floor(aabb.maxZ + 0.5);
            for (let x = bxMin; x <= bxMax; x++)
                for (let y = byMin; y <= byMax; y++)
                    for (let z = bzMin; z <= bzMax; z++)
                        if (isSolid(x, y, z) && blockOverlapsAABB(aabb, x, y, z)) return true;
            return false;
        }

        function getGroundHeight(pos) {
            const feetY = pos.y + P_FEET;
            const bxMin = Math.floor(pos.x - P_W + 0.5), bxMax = Math.floor(pos.x + P_W + 0.5);
            const bzMin = Math.floor(pos.z - P_W + 0.5), bzMax = Math.floor(pos.z + P_W + 0.5);
            let maxGround = -999;
            for (let x = bxMin; x <= bxMax; x++) {
                for (let z = bzMin; z <= bzMax; z++) {
                    for (let dy = 0; dy >= -3; dy--) {
                        const by = Math.floor(feetY + dy + 0.5);
                        if (isSolid(x, by, z)) { maxGround = Math.max(maxGround, by + 0.5); break; }
                    }
                }
            }
            return maxGround;
        }

        function getRayIntersection() {
            raycaster.setFromCamera(center, camera);
            const ray = raycaster.ray;
            const maxReach = 6, step = 0.05;
            const pos = ray.origin.clone();
            const dir = ray.direction.clone().multiplyScalar(step);
            let prevPos = null;
            for (let i = 0; i < maxReach / step; i++) {
                pos.add(dir);
                const rx = Math.round(pos.x), ry = Math.round(pos.y), rz = Math.round(pos.z);
                const key = getBlockKey(rx, ry, rz);
                const b = blocksData.get(key);
                if (b && b.type !== BLOCK_TYPES.WATER) {
                    let normal = new THREE.Vector3(0, 1, 0);
                    if (prevPos) {
                        const prx = Math.round(prevPos.x), pry = Math.round(prevPos.y), prz = Math.round(prevPos.z);
                        if (rx !== prx || ry !== pry || rz !== prz) normal.set(rx - prx, ry - pry, rz - prz).multiplyScalar(-1);
                    }
                    return { position: new THREE.Vector3(rx, ry, rz), normal };
                }
                prevPos = pos.clone();
            }
            return null;
        }

        const clock = new THREE.Clock();
        let hungerTimer = 0, regenTimer = 0;

        function animate() {
            requestAnimationFrame(animate);
            if (controls.isLocked && !inventoryOpen) {
                const delta = Math.min(clock.getDelta(), 0.1);
                currentIntersect = getRayIntersection();
                outlineMesh.visible = !!currentIntersect;
                if (currentIntersect) outlineMesh.position.copy(currentIntersect.position);

                if (isMining && currentIntersect) {
                    const pos = currentIntersect.position;
                    const block = blocksData.get(getBlockKey(pos.x, pos.y, pos.z));
                    if (block && block.type !== BLOCK_TYPES.WATER) {
                        if (!miningTarget || miningTarget.x !== block.x || miningTarget.y !== block.y || miningTarget.z !== block.z) {
                            miningTarget = { x: block.x, y: block.y, z: block.z, type: block.type };
                            miningProgress = 0;
                        }
                        const breakTime = BREAK_TIME[block.type] || 1.0;
                        miningProgress += delta / breakTime;
                        const stage = Math.min(9, Math.floor(miningProgress * 10));
                        crackMat.map = crackTextures[stage];
                        crackMat.needsUpdate = true;
                        crackMesh.position.copy(pos);
                        crackMesh.visible = true;
                        if (miningProgress >= 1.0) {
                            removeBlock(pos.x, pos.y, pos.z);
                            resetMining();
                        }
                    } else { resetMining(); }
                } else { crackMesh.visible = false; }

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 25.0 * delta;
                direction.z = Number(keys.w) - Number(keys.s);
                direction.x = Number(keys.d) - Number(keys.a);
                direction.normalize();
                const speed = 40.0;
                if (keys.w || keys.s) velocity.z -= direction.z * speed * delta;
                if (keys.a || keys.d) velocity.x -= direction.x * speed * delta;
                const oldPos = camera.position.clone();
                if (velocity.y < -1 && !onGround) fallStartY = fallStartY ?? camera.position.y;

                controls.moveRight(-velocity.x * delta);
                if (getCollisions(camera.position)) { camera.position.x = oldPos.x; velocity.x = 0; }
                controls.moveForward(-velocity.z * delta);
                if (getCollisions(camera.position)) { camera.position.z = oldPos.z; velocity.z = 0; }
                camera.position.y += velocity.y * delta;

                if (getCollisions(camera.position)) {
                    if (velocity.y < 0) {
                        const groundH = getGroundHeight(camera.position);
                        if (groundH !== -999) {
                            if (fallStartY !== null) {
                                const fallDist = fallStartY - camera.position.y;
                                if (fallDist > 3.5) health = Math.max(0, health - Math.floor(fallDist - 3) * 2);
                                fallStartY = null;
                                buildHearts();
                            }
                            camera.position.y = groundH - P_FEET + GROUND_EPS;
                            onGround = true;
                        } else camera.position.y = oldPos.y;
                    } else camera.position.y = oldPos.y;
                    velocity.y = 0;
                } else {
                    const feetAt = camera.position.y + P_FEET;
                    const groundH = getGroundHeight(camera.position);
                    if (groundH !== -999 && feetAt < groundH + 0.1 && velocity.y <= 0) {
                        if (fallStartY !== null) {
                            const fallDist = fallStartY - camera.position.y;
                            if (fallDist > 3.5) health = Math.max(0, health - Math.floor(fallDist - 3) * 2);
                            fallStartY = null;
                            buildHearts();
                        }
                        camera.position.y = groundH - P_FEET + GROUND_EPS;
                        onGround = true;
                        velocity.y = 0;
                    } else onGround = false;
                }

                if (keys.space && onGround) { velocity.y = 9.5; onGround = false; keys.space = false; fallStartY = camera.position.y; }

                hungerTimer += delta;
                if (hungerTimer > 15) { hungerTimer = 0; hunger = Math.max(0, hunger - 1); buildFood(); }
                if (hunger >= 18 && health < maxHealth) {
                    regenTimer += delta;
                    if (regenTimer > 3) { regenTimer = 0; health = Math.min(maxHealth, health + 1); buildHearts(); }
                }
                if (hunger <= 0) {
                    regenTimer += delta;
                    if (regenTimer > 4) { regenTimer = 0; health = Math.max(0, health - 1); buildHearts(); }
                }
                if (health <= 0 && !isDead) showDeath();
                if (camera.position.y < -40) { camera.position.set(0, spawnY || 10, 0); velocity.y = 0; health = Math.max(0, health - 5); buildHearts(); }
            } else {
                clock.getDelta();
                outlineMesh.visible = false;
                crackMesh.visible = false;
                if (isMining) resetMining();
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });
    </script>
</body>
</html>
